name: Deploy Quarto Book to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # 1. Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Quarto CLI
      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # 3. Setup R environment
      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      # 4. Install R dependencies (babelquarto and system tools)
      - name: Install R Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            github::ropensci/babelquarto

      # 5. Render Multilingual Book using babelquarto
      - name: Render Multilingual Book
        env:
          BABELQUARTO_CI_URL: "https://<username>.github.io/<repo-name>/" # 👈 Update with your site URL
        run: |
          Rscript -e 'babelquarto::render_book()'

      # 6. Copy Root Files (CNAME / custom covers)
      - name: Copy Critical Root Files to Output
        run: |
          cp CNAME _book/ 2>/dev/null || true
          cp cover.png _book/ 2>/dev/null || true

      # 7. Upload Pages Artifact
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_book'

      # 8. Deploy Artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4