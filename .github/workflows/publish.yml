name: Deploy Quarto Book to GitHub Pages

on:
  push:
    branches: [main] # Trigger on pushes to the main branch
  pull_request:
    branches: [main] # Trigger on pull requests (optional)
  workflow_dispatch: {} # Allows manual trigger from the GitHub UI

# Grant permissions needed for official GH Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # 1. Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for proper git history access by Quarto

      # 2. Setup Quarto
      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # 3. Render Profiles
      - name: Render English Profile (EN)
        run: quarto render --profile en

      - name: Render Chinese Profile (ZHT)
        run: quarto render --profile zh-hant

      # 4. Copy Critical Root Files
      - name: Copy Critical Root Files to Output
        run: |
          cp CNAME _book/
          cp cover.png _book/  
          cp root-redirect.html _book/index.html

      # 5. Upload Artifact (Official GH Pages Step)
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_book'

      # 6. Deploy Artifact (Official GH Pages Step)
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4