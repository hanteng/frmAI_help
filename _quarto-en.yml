encoding: "UTF-8"
lang: en

project:
  type: book
  output-dir: _book/en

# language: _language-zh-hant.yml 

book:
  title: "Harnessing Intelligence:<br/><small>AI Game Playbook</small>"
  author: "Han-Teng Liao"
  chapters:
    - file: preface.en.md
    - file: 00-02-notes-mental_fill-in.en.md
    - file: 00-03-notes-constructive_fill-in.en.md
    - file: toc.en.md         # This page will display the full TOC/Listings
    - part: "01----problematics.en.md"
      chapters:
        - 01-01-Turing_Test.en.md
        - 01-02-Chinese_Room.en.md
        - 01-03-Symbol_Grounding_Problem.en.md
        - 01-04-Frame_Problem.en.md
        - 01-05-Gestalt_Psychology.en.md
        - 01-06-Alignment_Control_Problem.en.md
        - 01-07-Language_Games.en.md

page-footer:
  left: |
     🙶Harnessing Intelligence: AI Game Playbook🙷 
     © Han-Teng Liao
  right: |
    aka  🙶The Tao of Intelligence: AI Game Playbook🙷 
    This book website is built by using <a href="https://quarto.org/">Quarto</a>.


bibliography: references.bib

format:
  html:
    lang: en                           # 確保英文配置下 HTML 語系正確
    theme:
      - zephyr                         # 或是你原本使用的基礎主題（如 default, slate 等）
      - styles-en.scss                 # 載入你專為英文版設計的 SCSS 檔案
    toc: true
    toc-location: right
    toc-title: "〜📖 On This Page 📑〜" # 順手將英文版的 TOC 標題中文化改為英文
    grid:
      sidebar-width: 330px    # Widened to give long English chapter titles room
      body-width: 850px       # Comfortable reading area for technical prose
      margin-width: 260px     # Keeps the Right TOC perfectly stable and distinct
      gutter-width: 1.5rem    # The air/padding between your three columns
    number-sections: true
    number-depth: 4
    section-title-appendices: "🔖 Appendices & Notes"
    crossref-nte-prefix: "Note"
    crossref-nte-title: "Note"
    crossref-tip-prefix: "Tip"
    crossref-tip-title: "Tip"
    callout-important-title: "Important"